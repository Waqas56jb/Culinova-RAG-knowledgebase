name: CI

# Nothing broken should ship. Every push / PR must: install, run the server test suite, and prove
# both frontends build. A red check blocks the merge.
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    name: server · tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      # The test suite is hermetic (pure engine logic — no DB / network), so it needs no secrets.
      - run: npm test

  frontends:
    name: ${{ matrix.app }} · build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [admin, client]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build
